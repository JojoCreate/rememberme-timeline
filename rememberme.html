<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RememberMe</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
}

/* EPAPER MODE */
.epaper * {
    transition: none !important;
    animation: none !important;
}

.epaper #bar {
    transition: none !important;
}

/* TOPBAR */
#topbar {
    height: 50px;
    background: #1f1f1f;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 14px;
}

#burger {
    font-size: 22px;
    cursor: pointer;
    margin-right: 10px;
}

#brand {
    font-weight: bold;
}

/* DRAWER */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    z-index: 5;
}

#drawer {
    position: fixed;
    left: -320px;
    top: 0;
    width: 300px;
    height: 100%;
    background: #2b2b2b;
    color: white;
    padding: 15px;
    transition: 0.3s;
    overflow-y: auto;
    z-index: 10;
}

#drawer.open { left: 0; }

/* CARDS */
.card {
    background: #3a3a3a;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.cardLabel {
    font-size: 11px;
    opacity: 0.7;
}

input {
    width: 100%;
    padding: 6px;
    margin-top: 4px;
}

/* BUTTON */
.button {
    padding: 10px;
    background: #4caf50;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    margin-top: 6px;
}

/* MAIN */
#main { padding: 30px; }

/* TIME LABELS */
#timeLabels {
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-bottom:6px;
}

/* TIMELINE */
#timeline {
    position: relative;
    height: 80px;
    background: #ddd;
    overflow: hidden;
    border-radius: 12px;
}

/* BAR */
#bar {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #4caf50, #8bc34a);
    border-radius: 12px;
    transition: width 0.5s linear;
}

/* MARKER */
.markerBar {
    position: absolute;
    top: 15%;
    height: 70%;
    background: rgba(255,82,82,0.7);
    border-radius: 6px;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: white;
    padding: 0 4px;
}

/* TIMER */
#timer {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
}
.flip {
    background: #222;
    color: #fff;
    padding: 4px 6px;
    margin: 0 2px;
    border-radius: 4px;
    font-size: 18px;
}

.sec {
    font-size: 11px;
    vertical-align: super;
    margin-left: 2px;
    opacity: 0.8;
}
#loadingOverlay {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(240,240,240,0.92);
    z-index: 5;
    text-align: center;
    gap: 10px;
    font-size: 14px;
    color: #333;
}

.loader {
    width: 18px;
    height: 18px;
    border: 3px solid #bbb;
    border-top: 3px solid #333;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.loadingText {
    font-weight: 500;
    opacity: 0.8;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="burger">☰</div>
    <div id="brand">RememberMe 💡</div>
</div>

<div id="overlay"></div>

<div id="drawer">

<div class="card">
<div class="cardLabel">Startzeit</div>
<input type="time" id="start" value="08:00">
</div>

<div class="card">
<div class="cardLabel">Endzeit</div>
<input type="time" id="end" value="08:30">
</div>

<div class="card">
<div class="cardLabel">Dauer</div>
<input type="number" id="duration" value="30">
</div>

<div class="card">
<div class="cardLabel">Timer</div>
<input type="checkbox" id="timerToggle" checked>
</div>

<!-- 🔥 NEU: EPAPER UI -->
<div class="card">
<div class="cardLabel">E-Paper Modus</div>
<input type="checkbox" id="epaperToggle">
</div>

<div class="card">
<div class="cardLabel">Marker</div>
<input type="time" id="markerStart">
<input type="number" id="markerDuration" placeholder="Dauer (Min)">
<input type="text" id="markerLabel" placeholder="Label">
<div class="button" id="addMarker">+ Marker</div>
<div id="markerList"></div>
</div>

</div>

<div id="main">

<div id="timeLabels">
<span id="startLabel"></span>
<span id="endLabel"></span>
</div>

<div id="timeline">
<div id="loadingOverlay">
<div class="loader"></div>
<div class="loadingText">Zeitraum nicht darstellbar</div>
</div>
<div id="bar"></div>
<div id="timer"></div>
</div>

</div>

<script>

/* ================= EPAPER STATE ================= */

let EPAPER_MODE = false;

$("#epaperToggle").on("change", function(){

    EPAPER_MODE = $(this).is(":checked");

    if(EPAPER_MODE){
        $("body").addClass("epaper");
    } else {
        $("body").removeClass("epaper");
    }

    update(); // sofortiger Refresh
});

/* ================= DRAWER ================= */
$("#burger").click(()=> {
    $("#drawer").addClass("open");
    $("#overlay").show();
});

$("#overlay").click(()=> {
    $("#drawer").removeClass("open");
    $("#overlay").hide();
});

/* ================= HELPERS ================= */

function toSec(t){
    let [h,m]=t.split(":");
    return h*3600+m*60;
}

function clamp(n,min,max){
    return Math.max(min,Math.min(max,n));
}

/* ================= SYNC ================= */

let isUpdating=false;

function syncFromDuration(){
    if(isUpdating || !$("#timerToggle").is(":checked")) return;
    isUpdating=true;

    let [h,m]=$("#start").val().split(":").map(Number);
    let total=h*60+m+(parseInt($("#duration").val())||0);

    $("#end").val(
        String(Math.floor(total/60)%24).padStart(2,"0")+":"+
        String(total%60).padStart(2,"0")
    );

    isUpdating=false;
}

function syncFromEnd(){
    if(isUpdating || !$("#timerToggle").is(":checked")) return;
    isUpdating=true;

    let [sh,sm]=$("#start").val().split(":").map(Number);
    let [eh,em]=$("#end").val().split(":").map(Number);

    let diff=(eh*60+em)-(sh*60+sm);
    if(diff<0) diff+=1440;

    $("#duration").val(diff);

    isUpdating=false;
}

$("#start,#duration").on("input change",syncFromDuration);
$("#end").on("input change",syncFromEnd);

/* ================= MARKERS ================= */

let markers=[];

$("#addMarker").click(()=>{

    let start=$("#markerStart").val();
    let dur=parseInt($("#markerDuration").val());
    let label=$("#markerLabel").val();

    if(!start||!dur) return;

    markers.push({start,dur,label});
    renderMarkerList();
});

function renderMarkerList(){

    let html="";

    markers.forEach((m,i)=>{

        html+=`
        <div style="margin-bottom:6px; font-size:12px; background:#444; padding:6px; border-radius:6px;">

            <div>
                <b>${m.label || "Marker"}</b>
            </div>

            <div>
                ${m.start} (${m.dur}m)
            </div>

            <div style="margin-top:4px; display:flex; gap:5px;">

                <button onclick="editMarker(${i})">Edit</button>
                <button onclick="deleteMarker(${i})" style="color:red;">X</button>

            </div>

        </div>
        `;
    });

    $("#markerList").html(html);
}

function deleteMarker(i){
    markers.splice(i,1);
    renderMarkerList();
}

function editMarker(i){

    let m = markers[i];

    $("#markerStart").val(m.start);
    $("#markerDuration").val(m.dur);
    $("#markerLabel").val(m.label);

    $("#addMarker").text("Speichern");

    $("#addMarker").off("click").on("click", function(){

        markers[i] = {
            start: $("#markerStart").val(),
            dur: parseInt($("#markerDuration").val()),
            label: $("#markerLabel").val()
        };

        resetAddButton();
        renderMarkerList();
    });
}

function resetAddButton(){

    $("#addMarker").text("+ Marker");

    $("#addMarker").off("click").on("click", function(){

        let start=$("#markerStart").val();
        let dur=parseInt($("#markerDuration").val());
        let label=$("#markerLabel").val();

        if(!start||!dur) return;

        markers.push({start,dur,label});
        renderMarkerList();
    });
}

/* ================= UPDATE LOOP ================= */

function update(){

let now=new Date();
let current=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

let s=toSec($("#start").val());
let e=toSec($("#end").val());
let d=e-s;

if(d<=0 || current < s || current > e){

    $("#bar").css("width","0%");
    $("#timer").html("");

    $("#loadingOverlay").css("display","flex");
    return;

} else {
    $("#loadingOverlay").hide();
}

$("#startLabel").text($("#start").val());
$("#endLabel").text($("#end").val());

let p=clamp((current-s)/d*100,0,100);
$("#bar").css("width",p+"%");

/* TIMER */
if($("#timerToggle").is(":checked")){
let r=e-current;
let h=Math.floor(r/3600);
let m=Math.floor((r%3600)/60);
let s=r%60;

$("#timer").html(`
<span class="flip">${h}</span> :
<span class="flip">${String(m).padStart(2,'0')}</span>
<span class="sec">${String(s).padStart(2,'0')}</span>
`);
} else {
$("#timer").html("");
}

/* MARKERS */
$(".markerBar").remove();

markers.forEach(m=>{

    let ms=toSec(m.start);
    let me=ms+(m.dur*60);

    let left=clamp((ms-s)/d*100,0,100);
    let width=clamp((me-ms)/d*100,0,100);

    let el=$(`<div class="markerBar">${m.label||""}</div>`);

    el.css({left:left+"%",width:width+"%"});

    $("#timeline").append(el);
});

}

/* ================= REFRESH ENGINE ================= */

update();
resetAddButton();
setInterval(update, EPAPER_MODE ? 60000 : 1000);

</script>

</body>
</html>
