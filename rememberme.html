<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RememberMe</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
}

/* TOPBAR */
#topbar {
    height: 50px;
    background: #1f1f1f;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 14px;
}

#burger {
    font-size: 22px;
    cursor: pointer;
    margin-right: 10px;
}

#brand {
    font-weight: bold;
}

/* DRAWER */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    z-index: 5;
}

#drawer {
    position: fixed;
    left: -320px;
    top: 0;
    width: 300px;
    height: 100%;
    background: #2b2b2b;
    color: white;
    padding: 15px;
    transition: 0.3s;
    overflow-y: auto;
    z-index: 10;
}

#drawer.open { left: 0; }

/* CARDS */
.card {
    background: #3a3a3a;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.cardLabel {
    font-size: 11px;
    opacity: 0.7;
}

input {
    width: 100%;
    padding: 6px;
}

/* BUTTON */
.button {
    padding: 10px;
    background: #4caf50;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    margin-top: 6px;
}

/* LEGAL */
#legalView { display: none; }

#legalContent {
    font-size: 12px;
    line-height: 1.4;
}

#backBtn {
    margin-bottom: 10px;
    cursor: pointer;
    color: #4caf50;
}

/* TIMELINE */
#main { padding: 20px; }

#timeline {
    position: relative;
    height: 45px;
    background: #ddd;
    overflow: hidden;
}

/* BAR */
#bar {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #4caf50, #8bc34a);
    z-index: 1;
}

/* MARKER */
#marker {
    position: absolute;
    top: 0;
    width: 3px;
    height: 100%;
    background: red;
    z-index: 3;
    display: none;
}

/* TIMER (FLIPCLOCK STYLE) */
#timer {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    z-index: 2;
    pointer-events: none;
}

.flip {
    background: #222;
    color: #fff;
    padding: 4px 6px;
    margin: 0 2px;
    border-radius: 4px;
    font-size: 16px;
}

.sec {
    font-size: 10px;
    vertical-align: super;
    margin-left: 2px;
    opacity: 0.8;
}

/* LOADING */
#loadingOverlay {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(200,200,200,0.85);
    z-index: 4;
}

.loader {
    width: 18px;
    height: 18px;
    border: 3px solid #aaa;
    border-top: 3px solid #333;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

</style>
</head>

<body>

<div id="topbar">
    <div id="burger">☰</div>
    <div id="brand">RememberMe 💡</div>
</div>

<div id="overlay"></div>

<div id="drawer">

<div id="settingsView">

<div class="card">
<div class="cardLabel">Startzeit</div>
<input type="time" id="start" value="08:00">
</div>

<div class="card">
<div class="cardLabel">Endzeit</div>
<input type="time" id="end" value="08:30">
</div>

<div class="card">
<div class="cardLabel">Dauer</div>
<input type="number" id="duration" value="30">
</div>

<div class="card">
<div class="cardLabel">Timer</div>
<input type="checkbox" id="timerToggle" checked>
</div>

<div class="card">
<div class="cardLabel">Marker</div>
<input type="datetime-local" id="markerInput">
</div>

<div class="button" id="openImpressum">Impressum</div>
<div class="button" id="openDatenschutz">Datenschutz</div>

</div>

<div id="legalView">
<div id="backBtn">← Zurück</div>
<div id="legalContent"></div>
</div>

</div>

<div id="main">
<div id="timeline">

<div id="bar"></div>
<div id="marker"></div>

<div id="timer"></div>

<div id="loadingOverlay">
<div class="loader"></div>
</div>

</div>
</div>

<script>

/* DRAWER */
$("#burger").click(()=> {
    $("#drawer").addClass("open");
    $("#overlay").show();
});

$("#overlay").click(()=> {
    $("#drawer").removeClass("open");
    $("#overlay").hide();
});

/* TIME HELPERS */
function toSec(t){
    let [h,m]=t.split(":");
    return h*3600+m*60;
}

function clamp(n,min,max){
    return Math.max(min,Math.min(max,n));
}

/* LOOP */
function update(){

let now=new Date();
let current=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

let s=toSec($("#start").val());
let e=toSec($("#end").val());
let d=e-s;

/* OUTSIDE RANGE */
if(d<=0 || current<s || current>e){
    $("#bar").css("width","0%");
    $("#timer").html("");
    $("#loadingOverlay").css("display","flex");
    return;
} else {
    $("#loadingOverlay").hide();
}

/* BAR */
let p=clamp((current-s)/d*100,0,100);
$("#bar").css("width",p+"%");

/* TIMER */
if($("#timerToggle").is(":checked")){

let r=e-current;

let h=Math.floor(r/3600);
let m=Math.floor((r%3600)/60);
let s2=r%60;

$("#timer").html(`
<span class="flip">${h}</span> :
<span class="flip">${String(m).padStart(2,'0')}</span>
<span class="sec">${String(s2).padStart(2,'0')}</span>
`);

} else {
$("#timer").html("");
}

/* MARKER */
let marker=$("#markerInput").val();

if(marker){
let d2=new Date(marker);
let sec=d2.getHours()*3600+d2.getMinutes()*60+d2.getSeconds();

let mp=clamp((sec-s)/d*100,0,100);
$("#marker").css("left",mp+"%").show();
} else {
$("#marker").hide();
}

}

setInterval(update,1000);
update();

</script>
