<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RememberMe</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
}

/* TOPBAR */
#topbar {
    height: 50px;
    background: #1f1f1f;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 14px;
}

#burger {
    font-size: 22px;
    cursor: pointer;
    margin-right: 10px;
}

#brand {
    font-weight: bold;
}

/* DRAWER */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    z-index: 5;
}

#drawer {
    position: fixed;
    left: -320px;
    top: 0;
    width: 300px;
    height: 100%;
    background: #2b2b2b;
    color: white;
    padding: 15px;
    transition: 0.3s;
    overflow-y: auto;
    z-index: 10;
}

#drawer.open { left: 0; }

/* CARDS */
.card {
    background: #3a3a3a;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.cardLabel {
    font-size: 11px;
    opacity: 0.7;
}

input {
    width: 100%;
    padding: 6px;
}

/* BUTTON */
.button {
    padding: 10px;
    background: #4caf50;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    margin-top: 6px;
}

/* LEGAL */
#legalView { display: none; }

#legalContent {
    font-size: 12px;
    line-height: 1.4;
}

#backBtn {
    margin-bottom: 10px;
    cursor: pointer;
    color: #4caf50;
}

/* MAIN */
#main { 
    padding: 30px; 
}

/* TIME LABELS */
#timeLabels {
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-bottom:6px;
    color:#333;
}

/* TIMELINE */
#timeline {
    position: relative;
    height: 80px;
    background: #ddd;
    overflow: hidden;
    border-radius: 12px;
}

/* BAR */
#bar {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #4caf50, #8bc34a);
    z-index: 1;
    border-radius: 12px;
    transition: width 0.5s linear;
}

/* MARKER */
#marker {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #ff5252;
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
    z-index: 3;
    display: none;
    box-shadow: 0 0 6px rgba(255,0,0,0.6);
}

/* TIMER */
#timer {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    z-index: 2;
    pointer-events: none;
}

.flip {
    background: #222;
    color: #fff;
    padding: 4px 6px;
    margin: 0 2px;
    border-radius: 4px;
    font-size: 18px;
}

.sec {
    font-size: 11px;
    vertical-align: super;
    margin-left: 2px;
    opacity: 0.8;
}

/* LOADING */
#loadingOverlay {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(200,200,200,0.85);
    z-index: 4;
}

.loader {
    width: 18px;
    height: 18px;
    border: 3px solid #aaa;
    border-top: 3px solid #333;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.markerBar {
    position: absolute;
    top: 15%;
    height: 70%;
    background: rgba(255,82,82,0.7);
    border-radius: 6px;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: white;
    padding: 0 4px;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="burger">☰</div>
    <div id="brand">RememberMe 💡</div>
</div>

<div id="overlay"></div>

<div id="drawer">

<div id="settingsView">

<div class="card">
<div class="cardLabel">Startzeit</div>
<input type="time" id="start" value="08:00">
</div>

<div class="card">
<div class="cardLabel">Endzeit</div>
<input type="time" id="end" value="08:30">
</div>

<div class="card">
<div class="cardLabel">Dauer</div>
<input type="number" id="duration" value="30">
</div>

<div class="card">
<div class="cardLabel">Timer</div>
<input type="checkbox" id="timerToggle" checked>
</div>

<div class="card">
<div class="cardLabel">Marker</div>
<input type="datetime-local" id="markerInput">
</div>

<div class="card">
<div class="cardLabel">Weitere Marker</div>

<input type="time" id="markerStart">
<input type="number" id="markerDuration" placeholder="Dauer (Minuten)">
<input type="text" id="markerLabel" placeholder="Label (optional)">

<div class="button" id="addMarker">+ Marker hinzufügen</div>

<div id="markerList" style="margin-top:8px;"></div>
</div>

<div class="button" id="openImpressum">Impressum</div>
<div class="button" id="openDatenschutz">Datenschutz</div>

</div>

<div id="legalView">
<div id="backBtn">← Zurück</div>
<div id="legalContent"></div>
</div>

</div>

<div id="main">

<div id="timeLabels">
<span id="startLabel"></span>
<span id="endLabel"></span>
</div>

<div id="timeline">
<div id="bar"></div>
<div id="marker"></div>
<div id="timer"></div>

<div id="loadingOverlay">
<div class="loader"></div>
Außerhalb der Zeitdarstellung
</div>

</div>
</div>

<script>

/* ===== MULTI MARKER SYSTEM (NEU) ===== */

let markers = [];

/* Marker hinzufügen */
$("#addMarker").click(()=>{

    let start = $("#markerStart").val();
    let duration = parseInt($("#markerDuration").val());
    let label = $("#markerLabel").val();

    if(!start || !duration) return;

    markers.push({
        start: start,
        dur: duration,
        label: label
    });

    renderMarkerList();
});

/* Marker löschen */
function deleteMarker(i){
    markers.splice(i,1);
    renderMarkerList();
}

/* Liste im Drawer anzeigen */
function renderMarkerList(){

    let html = "";

    markers.forEach((m,i)=>{
        html += `
        <div style="font-size:12px; margin-bottom:4px;">
            ${m.start} (${m.dur}m) ${m.label || ""}
            <span style="color:red; cursor:pointer;" onclick="deleteMarker(${i})">✕</span>
        </div>
        `;
    });

    $("#markerList").html(html);
}

/* DRAWER */
$("#burger").click(()=> {
    $("#drawer").addClass("open");
    $("#overlay").show();
});

$("#overlay").click(()=> {
    $("#drawer").removeClass("open");
    $("#overlay").hide();
});

/* LEGAL */
function showLegal(content){
    $("#settingsView").hide();
    $("#legalView").show();
    $("#legalContent").html(content);
}

$("#openImpressum").click(()=> {
    showLegal(`<h3>Impressum</h3>Johannes Parth`);
});

$("#openDatenschutz").click(()=> {
    showLegal(`<h3>Datenschutz</h3>Details...`);
});

$("#backBtn").click(()=> {
    $("#legalView").hide();
    $("#settingsView").show();
});

/* TIME HELPERS */
function toSec(t){
    let [h,m]=t.split(":");
    return h*3600+m*60;
}

function clamp(n,min,max){
    return Math.max(min,Math.min(max,n));
}

/* SYNC LOGIC */
let isUpdating = false;

function syncFromDuration(){
    if(isUpdating || !$("#timerToggle").is(":checked")) return;
    isUpdating = true;

    let start = $("#start").val();
    let duration = parseInt($("#duration").val()) || 0;

    let [h,m] = start.split(":").map(Number);
    let total = h*60 + m + duration;

    let eh = Math.floor(total/60) % 24;
    let em = total % 60;

    $("#end").val(String(eh).padStart(2,"0")+":"+String(em).padStart(2,"0"));

    isUpdating = false;
}

function syncFromEnd(){
    if(isUpdating || !$("#timerToggle").is(":checked")) return;
    isUpdating = true;

    let start = $("#start").val();
    let end = $("#end").val();

    let [sh,sm] = start.split(":").map(Number);
    let [eh,em] = end.split(":").map(Number);

    let sMin = sh*60+sm;
    let eMin = eh*60+em;

    let diff = eMin - sMin;
    if(diff < 0) diff += 1440;

    $("#duration").val(diff);

    isUpdating = false;
}

$("#start, #duration").on("input", syncFromDuration);
$("#end").on("input change", syncFromEnd);

/* LOOP */
function update(){

let now=new Date();
let current=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

let s=toSec($("#start").val());
let e=toSec($("#end").val());
let d=e-s;
/* ===== ZUSÄTZLICHE MARKER RENDERN (NEU) ===== */

$(".markerBar").remove();

markers.forEach(m=>{

    let ms = toSec(m.start);
    let me = ms + (m.dur * 60);

    let left = clamp((ms - s)/d*100,0,100);
    let width = clamp((me - ms)/d*100,0,100);

    let el = $(`
        <div class="markerBar">
            ${m.label || ""}
        </div>
    `);

    el.css({
        left: left + "%",
        width: width + "%"
    });

    $("#timeline").append(el);
});

/* LABEL UPDATE */
$("#startLabel").text($("#start").val());
$("#endLabel").text($("#end").val());

if(d<=0 || current<s || current>e){
    $("#bar").css("width","0%");
    $("#timer").html("");
    $("#loadingOverlay").css("display","flex");
    return;
} else {
    $("#loadingOverlay").hide();
}

let p=clamp((current-s)/d*100,0,100);
$("#bar").css("width",p+"%");

/* TIMER */
if($("#timerToggle").is(":checked")){
let r=e-current;

let h=Math.floor(r/3600);
let m=Math.floor((r%3600)/60);
let s2=r%60;

$("#timer").html(`
<span class="flip">${h}</span> :
<span class="flip">${String(m).padStart(2,'0')}</span>
<span class="sec">${String(s2).padStart(2,'0')}</span>
`);
} else {
$("#timer").html("");
}

/* MARKER */
let marker=$("#markerInput").val();

if(marker){
let d2=new Date(marker);
let sec=d2.getHours()*3600+d2.getMinutes()*60+d2.getSeconds();

let mp=clamp((sec-s)/d*100,0,100);
$("#marker").css("left",mp+"%").show();
} else {
$("#marker").hide();
}

}

setInterval(update,1000);
update();

</script>
</body>
</html>
