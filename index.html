<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RememberMe</title>

<link rel="icon" href="icon-192.png">

<style>

html, body {
    margin: 0;
    height: 100%;
    background: #1f1f1f;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ================= LOADING SCREEN ================= */
#loadingScreen {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

#icon {
    width: 90px;
    height: 90px;
}

#text {
    font-size: 16px;
    opacity: 0.9;
}

/* progress bar */
#barWrapper {
    width: 240px;
    height: 6px;
    background: #444;
    border-radius: 10px;
    overflow: hidden;
}

#bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4caf50, #8bc34a);
    transition: width 0.1s linear;
}

/* small hint */
#hint {
    font-size: 12px;
    opacity: 0.6;
}

</style>
</head>

<body>

<div id="loadingScreen">

    <img id="icon" src="icon-192.png" alt="icon">

    <div id="text">Zeit ist relativ…</div>

    <div id="barWrapper">
        <div id="bar"></div>
    </div>

    <div id="hint">RememberMe wird gestartet</div>

</div>

<script>

const DURATION = 15000; // 15s
const start = Date.now();

function getGreeting() {
    const h = new Date().getHours();

    if (h < 11) return "Guten Morgen ☀️";
    if (h < 17) return "Es ist Mittag 🌤️";
    if (h < 22) return "Guten Abend 🌙";
    return "Gute Nacht 🌌";
}

function loop() {

    const elapsed = Date.now() - start;
    const percent = Math.min((elapsed / DURATION) * 100, 100);

    // progress bar
    document.getElementById("bar").style.width = percent + "%";

    // text
    document.getElementById("text").innerText = getGreeting();

    // finish → redirect
    if (percent >= 100) {
        setTimeout(() => {
            window.location.href = "rememberme.html";
        }, 400);
    }
}

setInterval(loop, 100);

</script>

</body>
</html>
