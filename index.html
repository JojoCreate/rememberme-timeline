<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RememberMe Timeline V1.1</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

/* ================= BASE FIX ================= */
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    font-family: Arial;
    width: 100%;
    overflow-x: hidden;
}

/* ================= MENU ================= */
#menu {
    height: 90px;
    background: #333;
    color: white;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 15px;
    flex-wrap: wrap;
}

.menuGroup {
    display: flex;
    flex-direction: column;
    font-size: 12px;
    min-width: 120px;
}

input {
    width: 100%;
    max-width: 160px;
}

/* ================= BURGER ================= */
#burger {
    font-size: 22px;
    cursor: pointer;
    user-select: none;
}

/* Mobile Menu */
@media (max-width: 600px) {
    #menu {
        display: none;
        flex-direction: column;
        height: auto;
    }

    #menu.open {
        display: flex;
    }
}

/* ================= MAIN ================= */
#main {
    padding: 20px;
    background: #f0f0f0;
}

/* ================= TIMELINE ================= */
#timeline {
    position: relative;
    height: 45px;
    background: #ddd;
    display: flex;
    align-items: center;
}

/* BAR */
#bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #4caf50, #8bc34a);
}

/* TIMER */
#timer {
    position: absolute;
    width: 100%;
    text-align: center;
    font-weight: bold;
}

#timer small {
    font-size: 10px;
    vertical-align: super;
    opacity: 0.8;
}

/* MARKER */
#marker {
    position: absolute;
    width: 4px;
    height: 100%;
    background: red;
    display: none;
}

/* OVERLAY */
#overlay {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(200,200,200,0.8);
}

.loader {
    width: 18px;
    height: 18px;
    border: 3px solid #aaa;
    border-top: 3px solid #333;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

</style>
</head>

<body>

<!-- BURGER -->
<div id="burger">☰ Menu</div>

<!-- MENU -->
<div id="menu">

    <div class="menuGroup">
        Start
        <input type="time" id="start" value="08:00">
    </div>

    <div class="menuGroup">
        Ende
        <input type="time" id="end" value="08:30">
    </div>

    <div class="menuGroup">
        Dauer (Min)
        <input type="number" id="duration" min="1" value="30">
    </div>

    <div class="menuGroup">
        Timer
        <input type="checkbox" id="timerToggle" checked>
    </div>

    <div class="menuGroup">
        Marker
        <input type="datetime-local" id="markerInput">
    </div>

</div>

<!-- MAIN -->
<div id="main">

<div id="timeline">

    <div id="bar"></div>
    <div id="marker"></div>
    <div id="timer"></div>

    <div id="overlay">
        <div class="loader"></div>
    </div>

</div>

</div>

<script>

/* ================= STATE ================= */
let state = {
    start: "08:00",
    end: "08:30",
    marker: null
};

/* ================= HELPERS ================= */
function toSec(t){
    let [h,m] = t.split(":").map(Number);
    return h*3600 + m*60;
}

function clamp(n,min,max){
    return Math.max(min, Math.min(max,n));
}

/* ================= SYNC ================= */
function syncFromDuration(){
    let start = toSec($("#start").val());
    let dur = parseInt($("#duration").val() || 0);

    let end = start + dur * 60;
    $("#end").val(format(end));
}

function syncFromEnd(){
    let start = toSec($("#start").val());
    let end = toSec($("#end").val());

    let dur = Math.max(1, Math.round((end - start)/60));
    $("#duration").val(dur);
}

function format(sec){
    sec = ((sec % 86400) + 86400) % 86400;
    let h = Math.floor(sec/3600);
    let m = Math.floor((sec%3600)/60);
    return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0');
}

/* ================= EVENTS ================= */
$("#duration").on("input", syncFromDuration);
$("#end").on("change", syncFromEnd);

$("#timerToggle").on("change", function(){
    if(!this.checked){
        $("#timer").html("");
    }
});

$("#burger").on("click", function(){
    $("#menu").toggleClass("open");
});

$("#markerInput").on("change", function(){
    let d = new Date(this.value);
    state.marker =
        d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
});

/* ================= LOOP ================= */
function update(){

    let now = new Date();
    let current = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();

    let start = toSec($("#start").val());
    let end = toSec($("#end").val());

    let duration = end - start;

    if(duration <= 0){
        $("#overlay").show();
        $("#bar").css("width","0%");
        return;
    } else {
        $("#overlay").hide();
    }

    /* PROGRESS */
    let percent = ((current - start)/duration)*100;
    percent = clamp(percent,0,100);
    $("#bar").css("width",percent+"%");

    /* TIMER */
    if($("#timerToggle").is(":checked")){
        let remaining = Math.max(0,end-current);

        let h = Math.floor(remaining/3600);
        let m = Math.floor((remaining%3600)/60);
        let s = remaining%60;

        $("#timer").html(`${h}:${String(m).padStart(2,'0')}<small>${String(s).padStart(2,'0')}</small>`);
    }

    /* MARKER */
    if(state.marker !== null){
        let p = clamp(((state.marker-start)/duration)*100,0,100);
        $("#marker").css("left",p+"%").show();
    } else {
        $("#marker").hide();
    }
}

setInterval(update,1000);
update();

</script>

</body>
</html>
