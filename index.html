<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RememberMe</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
}

/* TOPBAR */
#topbar {
    height: 50px;
    background: #1f1f1f;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 14px;
}

#burger {
    font-size: 22px;
    cursor: pointer;
    margin-right: 10px;
}

#brand {
    font-weight: bold;
}

/* DRAWER */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
}

#drawer {
    position: fixed;
    left: -320px;
    top: 0;
    width: 300px;
    height: 100%;
    background: #2b2b2b;
    color: white;
    padding: 15px;
    transition: 0.3s;
    overflow-y: auto;
}

#drawer.open { left: 0; }

/* CARDS */
.card {
    background: #3a3a3a;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.cardLabel {
    font-size: 11px;
    opacity: 0.7;
}

input {
    width: 100%;
    padding: 6px;
}

/* BUTTON */
.button {
    padding: 10px;
    background: #4caf50;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    margin-top: 6px;
}

/* LEGAL VIEW */
#legalView { display: none; }

#legalContent {
    font-size: 12px;
    line-height: 1.4;
}

#backBtn {
    margin-bottom: 10px;
    cursor: pointer;
    color: #4caf50;
}

/* TIMELINE */
#main { padding: 20px; }

#timeline {
    position: relative;
    height: 45px;
    background: #ddd;
}

#bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #4caf50, #8bc34a);
}

#timer {
    position: absolute;
    width: 100%;
    text-align: center;
    font-weight: bold;
}

#marker {
    position: absolute;
    width: 4px;
    height: 100%;
    background: red;
}
</style>
</head>

<body>

<div id="topbar">
    <div id="burger">☰</div>
    <div id="brand">RememberMe 💡</div>
</div>

<div id="overlay"></div>

<div id="drawer">

    <!-- SETTINGS -->
    <div id="settingsView">

        <div class="card">
            <div class="cardLabel">Startzeit</div>
            <input type="time" id="start" value="08:00">
        </div>

        <div class="card">
            <div class="cardLabel">Endzeit</div>
            <input type="time" id="end" value="08:30">
        </div>

        <div class="card">
            <div class="cardLabel">Dauer (Minuten)</div>
            <input type="number" id="duration" value="30">
        </div>

        <div class="card">
            <div class="cardLabel">Timer aktiv</div>
            <input type="checkbox" id="timerToggle" checked>
        </div>

        <div class="card">
            <div class="cardLabel">Marker Zeit</div>
            <input type="datetime-local" id="markerInput">
        </div>

        <div class="button" id="openImpressum">Impressum</div>
        <div class="button" id="openDatenschutz">Datenschutz</div>

    </div>

    <!-- LEGAL VIEW -->
    <div id="legalView">
        <div id="backBtn">← Zurück</div>
        <div id="legalContent"></div>
    </div>

</div>

<div id="main">
    <div id="timeline">
        <div id="bar"></div>
        <div id="marker"></div>
        <div id="timer"></div>
    </div>
</div>

<script>

/* DRAWER */
$("#burger").click(()=> {
    $("#drawer").addClass("open");
    $("#overlay").show();
});

$("#overlay").click(()=> {
    $("#drawer").removeClass("open");
    $("#overlay").hide();
});

/* LEGAL */
function showLegal(content){
    $("#settingsView").hide();
    $("#legalView").show();
    $("#legalContent").html(content);
}

/* IMPRESSUM */
$("#openImpressum").click(()=> {
    showLegal(`
        <h3>Impressum</h3>
        Max Mustermann<br>
        Musterstraße 1<br>
        12345 Musterstadt<br>
        Deutschland<br><br>
        E-Mail: max@example.com
    `);
});

/* DATENSCHUTZ */
$("#openDatenschutz").click(()=> {
    showLegal(`
        <h3>Datenschutzerklärung</h3>

        <b>1. Verantwortlicher</b><br>
        Max Mustermann<br>
        Musterstraße 1<br>
        12345 Musterstadt<br>
        E-Mail: max@example.com<br><br>

        <b>2. Allgemeine Hinweise</b><br>
        Diese Website dient als Tool zur Visualisierung von Zeitabläufen („RememberMe“).
        Es werden keine personenbezogenen Daten aktiv gespeichert.<br><br>

        <b>3. Hosting über GitHub Pages</b><br>
        Diese Website wird über GitHub Pages bereitgestellt.
        Beim Aufruf der Seite werden technische Daten erfasst (z. B. IP-Adresse, Zeitpunkt).<br><br>

        <b>4. Externe Bibliotheken</b><br>
        Es wird jQuery über ein CDN geladen. Dabei kann eine Verbindung zu externen Servern entstehen.<br><br>

        <b>5. Lokale Verarbeitung</b><br>
        Alle Eingaben werden ausschließlich im Browser verarbeitet und nicht übertragen.<br><br>

        <b>6. Rechtsgrundlage</b><br>
        Art. 6 Abs. 1 lit. f DSGVO (berechtigtes Interesse an technischer Bereitstellung).<br><br>

        <b>7. Rechte</b><br>
        Auskunft, Löschung, Berichtigung im Rahmen der gesetzlichen Bestimmungen.<br><br>

        <b>8. Kontakt</b><br>
        max@example.com
    `);
});

/* BACK */
$("#backBtn").click(()=> {
    $("#legalView").hide();
    $("#settingsView").show();
});

/* TIME LOGIC */
function toSec(t){
    let [h,m]=t.split(":");
    return h*3600+m*60;
}

function clamp(n,min,max){
    return Math.max(min,Math.min(max,n));
}

$("#duration").on("input", function(){
    let s=toSec($("#start").val());
    let e=s+this.value*60;
    let d=new Date(e*1000);
    $("#end").val(d.toISOString().substr(11,5));
});

function update(){
    let now=new Date();
    let current=now.getHours()*3600+now.getMinutes()*60;

    let s=toSec($("#start").val());
    let e=toSec($("#end").val());
    let d=e-s;

    let p=clamp((current-s)/d*100,0,100);
    $("#bar").css("width",p+"%");

    if($("#timerToggle").is(":checked")){
        let r=e-current;
        $("#timer").text(Math.max(0,Math.floor(r/60))+" min");
    } else {
        $("#timer").text("");
    }

    let marker=$("#markerInput").val();
    if(marker){
        let m=new Date(marker);
        let sec=m.getHours()*3600+m.getMinutes()*60;
        let mp=clamp((sec-s)/d*100,0,100);
        $("#marker").css("left",mp+"%");
    }
}

setInterval(update,1000);
update();

</script>

</body>
</html>
