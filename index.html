<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RememberMe Timeline V1.2</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

/* ================= BASE ================= */
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    font-family: Arial;
    height: 100%;
    overflow-x: hidden;
    background: #f0f0f0;
}

/* ================= TOPBAR ================= */
#topbar {
    height: 50px;
    background: #222;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 15px;
}

#burger {
    font-size: 22px;
    cursor: pointer;
}

/* ================= DRAWER OVERLAY ================= */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: none;
    z-index: 10;
}

/* ================= DRAWER ================= */
#drawer {
    position: fixed;
    top: 0;
    left: -320px;
    width: 300px;
    height: 100%;
    background: #333;
    color: white;
    padding: 15px;
    transition: left 0.3s ease;
    z-index: 11;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

#drawer.open {
    left: 0;
}

/* ================= INPUTS ================= */
.menuGroup {
    display: flex;
    flex-direction: column;
    font-size: 12px;
}

input {
    padding: 5px;
    width: 100%;
}

/* ================= MAIN ================= */
#main {
    padding: 20px;
}

/* ================= TIMELINE ================= */
#timeline {
    position: relative;
    height: 45px;
    background: #ddd;
    display: flex;
    align-items: center;
    margin-top: 20px;
}

#bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #4caf50, #8bc34a);
}

#timer {
    position: absolute;
    width: 100%;
    text-align: center;
    font-weight: bold;
}

#timer small {
    font-size: 10px;
    vertical-align: super;
    opacity: 0.8;
}

#marker {
    position: absolute;
    width: 4px;
    height: 100%;
    background: red;
    display: none;
}

/* ================= OVERLAY LOADER ================= */
#loadingOverlay {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(200,200,200,0.85);
}

.loader {
    width: 18px;
    height: 18px;
    border: 3px solid #aaa;
    border-top: 3px solid #333;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div id="topbar">
    <div id="burger">☰ Menu</div>
</div>

<!-- DRAWER OVERLAY -->
<div id="overlay"></div>

<!-- DRAWER -->
<div id="drawer">

    <div class="menuGroup">
        Start
        <input type="time" id="start" value="08:00">
    </div>

    <div class="menuGroup">
        Ende
        <input type="time" id="end" value="08:30">
    </div>

    <div class="menuGroup">
        Dauer (Min)
        <input type="number" id="duration" value="30">
    </div>

    <div class="menuGroup">
        Timer
        <input type="checkbox" id="timerToggle" checked>
    </div>

    <div class="menuGroup">
        Marker
        <input type="datetime-local" id="markerInput">
    </div>

</div>

<!-- MAIN -->
<div id="main">

<div id="timeline">

    <div id="bar"></div>
    <div id="marker"></div>
    <div id="timer"></div>

    <div id="loadingOverlay">
        <div class="loader"></div>
    </div>

</div>

</div>

<script>

/* ================= HELPERS ================= */
function toSec(t){
    let [h,m] = t.split(":").map(Number);
    return h*3600 + m*60;
}

function clamp(n,min,max){
    return Math.max(min, Math.min(max,n));
}

/* ================= DRAWER ================= */
function openDrawer(){
    $("#drawer").addClass("open");
    $("#overlay").fadeIn(150);
}

function closeDrawer(){
    $("#drawer").removeClass("open");
    $("#overlay").fadeOut(150);
}

/* ================= EVENTS ================= */
$("#burger").on("click", openDrawer);
$("#overlay").on("click", closeDrawer);

/* ================= SYNC ================= */
$("#duration").on("input", function(){
    let start = toSec($("#start").val());
    let end = start + parseInt(this.value || 0)*60;
    $("#end").val(format(end));
});

$("#end").on("change", function(){
    let start = toSec($("#start").val());
    let end = toSec(this.value);
    let dur = Math.max(1, Math.round((end-start)/60));
    $("#duration").val(dur);
});

/* ================= FORMAT ================= */
function format(sec){
    sec = ((sec%86400)+86400)%86400;
    let h = Math.floor(sec/3600);
    let m = Math.floor((sec%3600)/60);
    return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0');
}

/* ================= LOOP ================= */
function update(){

    let now = new Date();
    let current = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();

    let start = toSec($("#start").val());
    let end = toSec($("#end").val());

    let duration = end - start;

    if(duration <= 0){
        $("#loadingOverlay").show();
        $("#bar").css("width","0%");
        return;
    } else {
        $("#loadingOverlay").hide();
    }

    /* PROGRESS */
    let percent = ((current-start)/duration)*100;
    percent = clamp(percent,0,100);
    $("#bar").css("width",percent+"%");

    /* TIMER */
    if($("#timerToggle").is(":checked")){
        let remaining = Math.max(0,end-current);

        let h = Math.floor(remaining/3600);
        let m = Math.floor((remaining%3600)/60);
        let s = remaining%60;

        $("#timer").html(`${h}:${String(m).padStart(2,'0')}<small>${String(s).padStart(2,'0')}</small>`);
    } else {
        $("#timer").html("");
    }

    /* MARKER */
    let marker = $("#markerInput").val();
    if(marker){
        let d = new Date(marker);
        let sec = d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();

        let p = clamp(((sec-start)/duration)*100,0,100);
        $("#marker").css("left",p+"%").show();
    } else {
        $("#marker").hide();
    }
}

setInterval(update,1000);
update();

</script>

</body>
</html>
