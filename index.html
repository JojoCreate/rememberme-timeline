<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RememberMe Timeline V1.3</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

/* ================= BASE ================= */
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    font-family: Arial;
    height: 100%;
    overflow-x: hidden;
    background: #f2f2f2;
}

/* ================= TOPBAR ================= */
#topbar {
    height: 52px;
    background: #1f1f1f;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
}

#burger {
    font-size: 22px;
    cursor: pointer;
}

#brand {
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 6px;
}

/* ================= OVERLAY ================= */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: none;
    z-index: 10;
}

/* ================= DRAWER ================= */
#drawer {
    position: fixed;
    top: 0;
    left: -340px;
    width: 320px;
    height: 100%;
    background: #2b2b2b;
    color: white;
    padding: 14px;
    transition: left 0.25s ease;
    z-index: 11;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

#drawer.open {
    left: 0;
}

/* ================= HEADER ================= */
#drawerHeader {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 6px;
}

/* ================= CARDS ================= */
.card {
    background: #3a3a3a;
    border-radius: 10px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.cardLabel {
    font-size: 11px;
    opacity: 0.7;
}

.cardValue input {
    width: 100%;
    padding: 6px;
    border-radius: 6px;
    border: none;
    outline: none;
}

/* ================= SWITCH ================= */
.switchRow {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.switch {
    width: 40px;
    height: 20px;
    position: relative;
}

.switch input {
    opacity: 0;
}

.slider {
    position: absolute;
    inset: 0;
    background: #888;
    border-radius: 20px;
    transition: 0.2s;
}

.slider:before {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    top: 3px;
    left: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.2s;
}

input:checked + .slider {
    background: #4caf50;
}

input:checked + .slider:before {
    transform: translateX(20px);
}

/* ================= MAIN ================= */
#main {
    padding: 20px;
}

/* ================= TIMELINE ================= */
#timeline {
    position: relative;
    height: 45px;
    background: #ddd;
    display: flex;
    align-items: center;
    margin-top: 20px;
}

#bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #4caf50, #8bc34a);
}

#timer {
    position: absolute;
    width: 100%;
    text-align: center;
    font-weight: bold;
}

#timer small {
    font-size: 10px;
    vertical-align: super;
    opacity: 0.8;
}

#marker {
    position: absolute;
    width: 4px;
    height: 100%;
    background: red;
    display: none;
}

/* ================= LOADER ================= */
#loadingOverlay {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(200,200,200,0.85);
}

.loader {
    width: 18px;
    height: 18px;
    border: 3px solid #aaa;
    border-top: 3px solid #333;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div id="topbar">
    <div id="burger">☰</div>
    <div id="brand">RememberMe 💡</div>
</div>

<!-- OVERLAY -->
<div id="overlay"></div>

<!-- DRAWER -->
<div id="drawer">

    <div id="drawerHeader">Einstellungen</div>

    <div class="card">
        <div class="cardLabel">Startzeit</div>
        <div class="cardValue">
            <input type="time" id="start" value="08:00">
        </div>
    </div>

    <div class="card">
        <div class="cardLabel">Endzeit</div>
        <div class="cardValue">
            <input type="time" id="end" value="08:30">
        </div>
    </div>

    <div class="card">
        <div class="cardLabel">Dauer (Minuten)</div>
        <div class="cardValue">
            <input type="number" id="duration" value="30">
        </div>
    </div>

    <div class="card switchRow">
        <div>
            <div class="cardLabel">Timer aktiv</div>
        </div>

        <label class="switch">
            <input type="checkbox" id="timerToggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="card">
        <div class="cardLabel">Marker Zeit</div>
        <div class="cardValue">
            <input type="datetime-local" id="markerInput">
        </div>
    </div>

</div>

<!-- MAIN -->
<div id="main">

<div id="timeline">

    <div id="bar"></div>
    <div id="marker"></div>
    <div id="timer"></div>

    <div id="loadingOverlay">
        <div class="loader"></div>
    </div>

</div>

</div>

<script>

/* ================= HELPERS ================= */
function toSec(t){
    let [h,m] = t.split(":").map(Number);
    return h*3600 + m*60;
}

function clamp(n,min,max){
    return Math.max(min, Math.min(max,n));
}

function format(sec){
    sec = ((sec%86400)+86400)%86400;
    let h = Math.floor(sec/3600);
    let m = Math.floor((sec%3600)/60);
    return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0');
}

/* ================= SYNC ================= */
$("#duration").on("input", function(){
    let start = toSec($("#start").val());
    let end = start + parseInt(this.value||0)*60;
    $("#end").val(format(end));
});

$("#end").on("change", function(){
    let start = toSec($("#start").val());
    let end = toSec(this.value);
    let dur = Math.max(1, Math.round((end-start)/60));
    $("#duration").val(dur);
});

/* ================= DRAWER ================= */
$("#burger").on("click", function(){
    $("#drawer").addClass("open");
    $("#overlay").fadeIn(150);
});

$("#overlay").on("click", function(){
    $("#drawer").removeClass("open");
    $("#overlay").fadeOut(150);
});

/* ================= LOOP ================= */
function update(){

    let now = new Date();
    let current = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();

    let start = toSec($("#start").val());
    let end = toSec($("#end").val());

    let duration = end - start;

    if(duration <= 0){
        $("#loadingOverlay").show();
        $("#bar").css("width","0%");
        return;
    } else {
        $("#loadingOverlay").hide();
    }

    let percent = clamp(((current-start)/duration)*100,0,100);
    $("#bar").css("width",percent+"%");

    if($("#timerToggle").is(":checked")){
        let remaining = Math.max(0,end-current);

        let h = Math.floor(remaining/3600);
        let m = Math.floor((remaining%3600)/60);
        let s = remaining%60;

        $("#timer").html(`${h}:${String(m).padStart(2,'0')}<small>${String(s).padStart(2,'0')}</small>`);
    } else {
        $("#timer").html("");
    }

    let marker = $("#markerInput").val();
    if(marker){
        let d = new Date(marker);
        let sec = d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();

        let p = clamp(((sec-start)/duration)*100,0,100);
        $("#marker").css("left",p+"%").show();
    } else {
        $("#marker").hide();
    }
}

setInterval(update,1000);
update();

</script>

</body>
</html>
