<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RememberMe</title>
<link rel="icon" href="icon-192.png">

<style>

html, body {
    margin: 0;
    height: 100%;
    background: #1f1f1f;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ================= LOADER WRAPPER ================= */
#loadingScreen {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    position: relative;
}

/* ICON */
#icon {
    width: 90px;
    height: 90px;
}

/* TEXT */
#text {
    font-size: 16px;
    opacity: 0.9;
}

/* ================= PROGRESS BAR ================= */
#barWrapper {
    width: 320px;
    height: 14px;
    background: #444;
    border-radius: 0px; /* eckig */
    overflow: hidden;
    position: relative;
}

#bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4caf50, #8bc34a);
    transition: width 0.1s linear;
}

/* ================= POPUP EVENTS ================= */
.event {
    position: absolute;
    bottom: 70px;
    background: #2ecc71;
    color: #111;
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 6px;
    animation: pop 2.5s ease forwards;
    white-space: nowrap;
}

@keyframes pop {
    0% {
        transform: translateY(20px) scale(0.8);
        opacity: 0;
    }
    20% {
        transform: translateY(0px) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(-40px) scale(0.95);
        opacity: 0;
    }
}

#hint {
    font-size: 12px;
    opacity: 0.6;
}

/* layout helper */
#stage {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}

</style>
</head>

<body>

<div id="loadingScreen">

    <div id="stage">

        <img id="icon" src="icon-192.png">

        <div id="text">Zeit ist relativ…</div>

        <div id="barWrapper">
            <div id="bar"></div>
        </div>

    </div>

    <div id="hint">RememberMe startet…</div>

</div>

<script>

const DURATION = 15000;
const start = Date.now();

/* ================= FUNNY EVENTS ================= */
const events = [
    "Meeting: Kaffee wird kalt",
    "Deadline: Panik-Phase beginnt",
    "Sync: keiner hört zu",
    "Reminder: Wasser trinken vergessen",
    "Call: Mikro ist aus",
    "Task: später machen (nie)",
    "Break: 5 Minuten = 45 Minuten",
    "Planung: komplett umgeworfen",
    "Alarm: Snooze Meisterschaft",
    "Notiz: eigentlich wichtig"
];

/* ================= GREETING ================= */
function getGreeting() {
    const h = new Date().getHours();

    if (h < 11) return "Guten Morgen ☀️";
    if (h < 17) return "Es ist Mittag 🌤️";
    if (h < 22) return "Guten Abend 🌙";
    return "Gute Nacht 🌌";
}

/* ================= POP EVENT ================= */
function spawnEvent() {

    const text = events[Math.floor(Math.random() * events.length)];

    const el = document.createElement("div");
    el.className = "event";
    el.innerText = text;

    // random x position above bar
    el.style.left = (Math.random() * 260 + 20) + "px";

    document.getElementById("loadingScreen").appendChild(el);

    setTimeout(() => {
        el.remove();
    }, 2500);
}

/* ================= LOOP ================= */
function loop() {

    const elapsed = Date.now() - start;
    const percent = Math.min((elapsed / DURATION) * 100, 100);

    document.getElementById("bar").style.width = percent + "%";
    document.getElementById("text").innerText = getGreeting();

    if (percent >= 100) {
        setTimeout(() => {
            window.location.href = "rememberme.html";
        }, 400);
    }
}

setInterval(loop, 100);

/* ================= RANDOM EVENTS ================= */
let eventTimer = setInterval(() => {
    if (Date.now() - start > DURATION) {
        clearInterval(eventTimer);
        return;
    }
    spawnEvent();
}, 1500);

</script>

</body>
</html>
