<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RememberMe</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

/* ================= BASE ================= */
* { box-sizing: border-box; }

html, body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
}

/* ================= TOPBAR ================= */
#topbar {
    height: 50px;
    background: #1f1f1f;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 14px;
}

#burger {
    font-size: 22px;
    cursor: pointer;
    margin-right: 10px;
}

#brand {
    font-weight: bold;
}

/* ================= DRAWER ================= */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
}

#drawer {
    position: fixed;
    left: -320px;
    top: 0;
    width: 300px;
    height: 100%;
    background: #2b2b2b;
    color: white;
    padding: 15px;
    transition: 0.3s;
    overflow-y: auto;
}

#drawer.open { left: 0; }

/* ================= CARDS ================= */
.card {
    background: #3a3a3a;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.cardLabel {
    font-size: 11px;
    opacity: 0.7;
}

input {
    width: 100%;
    padding: 6px;
}

/* ================= BUTTON ================= */
.button {
    padding: 10px;
    background: #4caf50;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
}

/* ================= LEGAL VIEW ================= */
#legalView {
    display: none;
}

#legalView h3 {
    margin-top: 0;
}

#backBtn {
    margin-bottom: 10px;
    cursor: pointer;
    color: #4caf50;
}

/* ================= TIMELINE ================= */
#main { padding: 20px; }

#timeline {
    position: relative;
    height: 45px;
    background: #ddd;
}

#bar {
    height: 100%;
    width: 0%;
    background: green;
}

#timer {
    position: absolute;
    width: 100%;
    text-align: center;
    font-weight: bold;
}

#marker {
    position: absolute;
    width: 4px;
    height: 100%;
    background: red;
}

</style>
</head>

<body>

<div id="topbar">
    <div id="burger">☰</div>
    <div id="brand">RememberMe 💡</div>
</div>

<div id="overlay"></div>

<div id="drawer">

    <!-- SETTINGS -->
    <div id="settingsView">

        <div class="card">
            <div class="cardLabel">Startzeit</div>
            <input type="time" id="start" value="08:00">
        </div>

        <div class="card">
            <div class="cardLabel">Endzeit</div>
            <input type="time" id="end" value="08:30">
        </div>

        <div class="card">
            <div class="cardLabel">Dauer</div>
            <input type="number" id="duration" value="30">
        </div>

        <div class="card">
            <div class="cardLabel">Timer</div>
            <input type="checkbox" id="timerToggle" checked>
        </div>

        <div class="card">
            <div class="cardLabel">Marker</div>
            <input type="datetime-local" id="markerInput">
        </div>

        <div class="button" id="openImpressum">Impressum</div>
        <div class="button" id="openDatenschutz">Datenschutz</div>

    </div>

    <!-- LEGAL VIEW -->
    <div id="legalView">
        <div id="backBtn">← Zurück</div>
        <div id="legalContent"></div>
    </div>

</div>

<div id="main">
    <div id="timeline">
        <div id="bar"></div>
        <div id="marker"></div>
        <div id="timer"></div>
    </div>
</div>

<script>

/* ================= DRAWER ================= */
$("#burger").click(()=> {
    $("#drawer").addClass("open");
    $("#overlay").show();
});

$("#overlay").click(()=> {
    $("#drawer").removeClass("open");
    $("#overlay").hide();
});

/* ================= LEGAL NAV ================= */
function showLegal(content){
    $("#settingsView").hide();
    $("#legalView").show();
    $("#legalContent").html(content);
}

$("#openImpressum").click(()=> {
    showLegal(`
        <h3>Impressum</h3>
        Max Mustermann<br>
        Musterstraße 1<br>
        Deutschland<br><br>
        E-Mail: max@example.com
    `);
});

$("#openDatenschutz").click(()=> {
    showLegal(`
        <h3>Datenschutz</h3>
        Diese Website wird über GitHub Pages betrieben.<br>
        Es werden keine personenbezogenen Daten gespeichert.<br>
        Technische Daten können durch den Hosting-Anbieter erfasst werden.
    `);
});

$("#backBtn").click(()=> {
    $("#legalView").hide();
    $("#settingsView").show();
});

/* ================= TIME ================= */
function toSec(t){
    let [h,m]=t.split(":");
    return h*3600+m*60;
}

function clamp(n,min,max){
    return Math.max(min,Math.min(max,n));
}

$("#duration").on("input", function(){
    let s=toSec($("#start").val());
    let e=s+this.value*60;
    $("#end").val(new Date(e*1000).toISOString().substr(11,5));
});

function update(){
    let now=new Date();
    let current=now.getHours()*3600+now.getMinutes()*60;

    let s=toSec($("#start").val());
    let e=toSec($("#end").val());
    let d=e-s;

    let p=clamp((current-s)/d*100,0,100);
    $("#bar").css("width",p+"%");

    if($("#timerToggle").is(":checked")){
        let r=e-current;
        $("#timer").text(Math.max(0,Math.floor(r/60))+" min");
    } else {
        $("#timer").text("");
    }

    let marker=$("#markerInput").val();
    if(marker){
        let m=new Date(marker);
        let sec=m.getHours()*3600+m.getMinutes()*60;
        let mp=clamp((sec-s)/d*100,0,100);
        $("#marker").css("left",mp+"%");
    }
}

setInterval(update,1000);
update();

</script>

</body>
</html>
